name: automerge

# Enable GitHub auto-merge on Dependabot's (already-cooled-down) digest PRs.
# Auto-merge waits for the required `validate` check (branch protection) before
# merging, so a bump only lands once its digest is confirmed to resolve. The
# 7-day cooldown already happened upstream of this, in Dependabot.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
