name: mirror

# Copy each digest-pinned upstream image to ghcr.io/echthesia/<name>:<tag>.
# Runs after a (Dependabot, soaked) digest bump merges to main, and on demand.
# Copies BY DIGEST (not by tag) so what we publish is exactly what was reviewed
# and soaked — no TOCTOU where upstream :tag moves between merge and copy.

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends skopeo

      - name: Log in to GHCR
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | skopeo login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Copy pinned digests to ghcr.io/echthesia
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          owner="${owner,,}"   # GHCR paths must be lowercase
          grep '^FROM ' Dockerfile | while read -r _ ref _ name; do
            src_repo="${ref%@*}"          # docker.io/library/traefik:v3
            digest="${ref#*@}"            # sha256:...
            src_norepo="${src_repo%:*}"   # docker.io/library/traefik
            tag="${src_repo##*:}"         # v3
            dest="ghcr.io/${owner}/${name}:${tag}"
            echo "::group::${name}  ${src_norepo}@${digest} -> ${dest}"
            skopeo copy --all --retry-times 3 \
              "docker://${src_norepo}@${digest}" "docker://${dest}"
            echo "::endgroup::"
          done
